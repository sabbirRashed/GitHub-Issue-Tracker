<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Track & Manage Your Project Issues</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- daisyUi & tailwind cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fontawsome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- stylesheet -->
    <link rel="stylesheet" href="./Style/style.css">
</head>

<body class="bg-base-200 min-h-screen">
    <header>
        <nav class="bg-white shadow-sm p-4 ">
            <div class="flex flex-col md:flex-row justify-between items-center gap-5 max-w-[1140px] mx-auto">
                <div class="flex flex-col md:flex-row items-center gap-1">
                    <div><img src="./assets/github-logo.png" alt="" class="h-9 w-auto"></div>
                    <h2 class="text-2xl text-[#1F2937] font-semibold">GitHub Issues Tracker</h2>
                </div>

                <div>
                    <div class="join">
                        <div>
                            <label class="input validator join-item">
                                <input type="text" placeholder="Search issues..." required />
                            </label>
                        </div>
                        <button class="btn btn-primary join-item">Searh</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="max-w-11/12 xl:max-w-[1140px] mx-auto mt-10 md:mt-15">
        <!-- tab section -->
        <section class="bg-white p-6 rounded-lg shadow-sm space-x-2 space-y-2 flex flex-col  sm:flex-row">
            <div class="w-full sm:w-25"><button class="btn font-semibold text-[#64748B] w-full ">All </button></div>
            <div class="w-full sm:w-25"><button class="btn font-semibold text-[#64748B] w-full ">Open </button></div>
            <div class="w-full sm:w-25"><button class="btn font-semibold text-[#64748B] w-full ">Closed </button></div>
        </section>
    </main>
</body>
